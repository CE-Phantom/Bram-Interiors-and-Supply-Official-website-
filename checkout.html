<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <style>
    body { font-family:Arial; padding:20px; }

    .box {
      max-width:400px;
      margin:auto;
    }

    input, textarea {
      width:100%; padding:10px;
      margin:10px 0;
    }

    button {
      width:100%; padding:12px;
      background:black; color:white;
      border:none;
    }
  </style>
</head>

<body>

<h2>Checkout</h2>

<div class="box">
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <textarea id="location" placeholder="Location"></textarea>

  <button onclick="send()">Place Order</button>
</div>

<script>
function send(){

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let location=document.getElementById("location").value;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let msg="NEW ORDER%0A%0A";
  let total=0;

  cart.forEach(item=>{
    let sum=item.price*item.qty;
    total+=sum;
    msg+=`${item.name} x${item.qty} = Ksh ${sum}%0A`;
  });

  msg+=`%0ATOTAL: Ksh ${total}%0A%0A`;
  msg+=`Name: ${name}%0APhone: ${phone}%0ALocation: ${location}`;

  window.location.href="https://wa.me/254XXXXXXXXX?text="+msg;
}
</script>

</body>
</html>
