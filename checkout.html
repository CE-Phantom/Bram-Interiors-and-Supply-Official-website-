<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <style>
    body { font-family:Arial; padding:20px; }

    .box {
      max-width:400px;
      margin:auto;
    }

    input, textarea {
      width:100%; padding:10px;
      margin:10px 0;
    }

    button {
      width:100%; padding:12px;
      background:black; color:white;
      border:none;
    }
  </style>
</head>

<body>

<h2>Checkout</h2>

<div class="box">
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <textarea id="location" placeholder="Location"></textarea>

  <button onclick="send()">Place Order</button>
</div>

<script>
function send() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let location = document.getElementById("location").value;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let msg = "🛒 *NEW ORDER - Bram Interiors*%0A%0A";

  let total = 0;

  if(cart.length === 0){
    msg += "⚠️ No items in cart%0A";
  } else {
    cart.forEach(item => {
      let subtotal = item.price * item.qty;
      total += subtotal;

      msg += `• ${item.name} x${item.qty} = Ksh ${subtotal}%0A`;
    });

    msg += `%0A💰 Total: Ksh ${total}%0A%0A`;
  }

  msg += `👤 Name: ${name}%0A`;
  msg += `📞 Phone: ${phone}%0A`;
  msg += `📍 Location: ${location}`;

  window.location.href =
    "https://wa.me/+254 752 902370?text=" + msg;
}
</script>

</body>
</html>
