<!DOCTYPE html>
<html>
<head>
  <title>Bram Interiors Supply Store</title>
  <style>
    body { font-family: Arial; margin:0; background:#f4f6f8; }

    header {
      background:#111; color:white; padding:20px;
      text-align:center; font-size:24px;
    }

    .cart {
      position:fixed; top:15px; right:15px;
      background:white; padding:10px 15px;
      border-radius:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .products {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px; padding:20px;
    }

    .product {
      background:white; padding:15px;
      border-radius:12px; text-align:center;
      box-shadow:0 5px 12px rgba(0,0,0,0.08);
    }

    .product img {
      width:100%; height:140px;
      object-fit:cover; border-radius:10px;
    }

    .product button {
      margin-top:10px; padding:10px;
      background:black; color:white;
      border:none; border-radius:6px;
    }

    .checkout-btn {
      display:block; margin:20px auto;
      padding:15px 30px; background:#27ae60;
      color:white; border:none; border-radius:8px;
    }
  </style>
</head>

<body>

<header>Bram Interiors Materials Store</header>

<div class="cart">🛒 <span id="count">0</span></div>

<div class="products">

  <!-- PRODUCTS -->
  <script>
    const items = [
      ["Gypsum Board",1200,"gypsum.jpg"],
      ["Plywood",2500,"plywood.jpg"],
      ["MDF Board",2000,"mdf.jpg"],
      ["Metal Studs",1500,"metal.jpg"],
      ["Ceiling Boards",1800,"ceiling.jpg"],
      ["Screws Box",800,"screws.jpg"],
      ["Adhesive",600,"glue.jpg"],
      ["Paint Bucket",3500,"paint.jpg"],
      ["PVC Panels",2200,"pvc.jpg"],
      ["Nails Pack",500,"nails.jpg"]
    ];

    let cart = [];

    items.forEach((item,i)=>{
      document.write(`
      <div class="product">
        <img src="images/${item[2]}">
        <h3>${item[0]}</h3>
        <p>Ksh ${item[1]}</p>
        <input type="number" min="1" value="1" id="qty${i}">
        <button onclick="add('${item[0]}',${item[1]},${i})">Add</button>
      </div>
      `);
    });

    function add(name,price,i){
      let qty = document.getElementById("qty"+i).value;
      cart.push({name,price,qty});
      document.getElementById("count").innerText = cart.length;
    }

    function checkout(){
      localStorage.setItem("cart",JSON.stringify(cart));
      window.location.href="checkout.html";
    }
  </script>

</div>

<button class="checkout-btn" onclick="checkout()">Checkout</button>

</body>
</html>
