<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Bram Interiors - Raw Materials</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2a5c3d;
            --secondary-color: #d4af8c;
            --accent-color: #8a6e4d;
            --light-color: #f8f5f2;
            --dark-color: #1a1a1a;
            --text-color: #333;
            --light-text: #777;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--light-color);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .shop-header {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-button {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-button:hover {
            background: var(--accent-color);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--dark-color);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--secondary-color);
            color: var(--dark-color);
            border-radius: 50%;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .shop-title {
            text-align: center;
            margin: 40px 0 20px;
        }

        .shop-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .shop-title p {
            color: var(--light-text);
            font-size: 1.1rem;
        }

        .shop-main {
            padding: 20px 0 60px;
        }

        .shop-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: var(--secondary-color);
            color: var(--dark-color);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .product-img {
            height: 200px;
            width: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quantity-row {
            display: flex;
            gap: 10px;
        }

        .quantity-selector {
            width: 70px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .color-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .add-to-cart {
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .add-to-cart:hover {
            background-color: var(--accent-color);
        }

        /* Cart Sidebar */
        .cart-sidebar {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 100px;
        }

        .cart-sidebar h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light-color);
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 2;
        }

        .cart-item-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-detail {
            font-size: 0.85rem;
            color: var(--light-text);
        }

        .cart-item-price {
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item-quantity button {
            width: 25px;
            height: 25px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .cart-item-quantity button:hover {
            background-color: var(--light-color);
        }

        .cart-item-quantity span {
            min-width: 30px;
            text-align: center;
        }

        .remove-item {
            color: #ff4444;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .remove-item:hover {
            color: #cc0000;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            padding-top: 20px;
            border-top: 2px solid var(--light-color);
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .checkout-btn:hover {
            background-color: var(--accent-color);
        }

        @media (max-width: 992px) {
            .shop-container {
                grid-template-columns: 1fr;
            }
            .cart-sidebar {
                position: static;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

<div class="shop-header">
    <div class="container">
        <div class="header-content">
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
</div>

<div class="container shop-title">
    <h1>Raw Materials & Hardware</h1>
    <p>Premium boards, screws, hinges, and more for your interior projects</p>
</div>

<div class="shop-main">
    <div class="container">
        <div class="shop-container">
            <div class="products-grid" id="productsGrid"></div>
            <div class="cart-sidebar">
                <h3>Shopping Cart</h3>
                <div class="cart-items" id="cartItems">
                    <p style="text-align: center; color: var(--light-text);">Your cart is empty</p>
                </div>
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">KSh 0</span>
                </div>
                <a href="checkout.html" class="checkout-btn" id="checkoutBtn">Proceed to Checkout</a>
            </div>
        </div>
    </div>
</div>

<script>
    // Product data with categories that need color
    const products = [
        { id: 1, name: '18mm MDF Board (4x8 ft)', price: 4500, image: 'https://images.unsplash.com/photo-1589939705384-5185137a7f0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Boards', needsColor: true },
        { id: 2, name: '12mm Plywood (4x8 ft)', price: 3800, image: 'https://images.unsplash.com/photo-1589939705384-5185137a7f0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Boards', needsColor: true },
        { id: 3, name: 'Wood Screws (50mm) - 100pcs', price: 850, image: 'https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Hardware', needsColor: false },
        { id: 4, name: 'Drywall Screws (25mm) - 200pcs', price: 650, image: 'https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Hardware', needsColor: false },
        { id: 5, name: 'Cabinet Hinges (Soft-close) - 10pcs', price: 2200, image: 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Hardware', needsColor: false },
        { id: 6, name: 'Drawer Slides (45cm) - Pair', price: 1800, image: 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Hardware', needsColor: false },
        { id: 7, name: 'Wood Glue (1L)', price: 950, image: 'https://images.unsplash.com/photo-1581291518633-83b4ebd1d83e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Adhesives', needsColor: true },
        { id: 8, name: 'Sandpaper Assorted (10 sheets)', price: 350, image: 'https://images.unsplash.com/photo-1581291518633-83b4ebd1d83e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Tools', needsColor: false },
        { id: 9, name: 'Edge Banding Tape (22mm) - 50m', price: 1200, image: 'https://images.unsplash.com/photo-1589939705384-5185137a7f0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Trim', needsColor: true },
        { id: 10, name: 'PVC Skirting Board (2.4m)', price: 850, image: 'https://images.unsplash.com/photo-1589939705384-5185137a7f0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Trim', needsColor: true },
        { id: 11, name: 'Nails (50mm) - 1kg', price: 450, image: 'https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Hardware', needsColor: false },
        { id: 12, name: 'Laminate Sheet (4x8 ft)', price: 3200, image: 'https://images.unsplash.com/photo-1589939705384-5185137a7f0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80', category: 'Boards', needsColor: true }
    ];

    let cart = [];

    // DOM elements
    const productsGrid = document.getElementById('productsGrid');
    const cartItemsDiv = document.getElementById('cartItems');
    const cartCountSpan = document.getElementById('cartCount');
    const cartTotalSpan = document.getElementById('cartTotal');

    function showNotification(msg) {
        const notif = document.createElement('div');
        notif.style.cssText = `position:fixed; top:100px; right:20px; background:var(--primary-color); color:white; padding:15px 25px; border-radius:4px; z-index:3000; animation:slideIn 0.3s ease;`;
        notif.textContent = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCartDisplay() {
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p style="text-align:center; color:var(--light-text);">Your cart is empty</p>';
            cartCountSpan.textContent = '0';
            cartTotalSpan.textContent = 'KSh 0';
            saveCart();
            return;
        }

        let total = 0;
        let itemCount = 0;
        cartItemsDiv.innerHTML = cart.map(item => {
            total += item.price * item.quantity;
            itemCount += item.quantity;
            return `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        ${item.color ? `<div class="cart-item-detail">Color: ${item.color}</div>` : ''}
                        <div class="cart-item-price">KSh ${item.price.toLocaleString()} each</div>
                    </div>
                    <div class="cart-item-quantity">
                        <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                    </div>
                    <i class="fas fa-trash remove-item" onclick="removeFromCart(${item.id})"></i>
                </div>
            `;
        }).join('');
        cartCountSpan.textContent = itemCount;
        cartTotalSpan.textContent = `KSh ${total.toLocaleString()}`;
        saveCart();
    }

    window.addToCart = function(productId) {
        const product = products.find(p => p.id === productId);
        const quantity = parseInt(document.getElementById(`qty-${productId}`).value);
        let color = '';
        if (product.needsColor) {
            color = document.getElementById(`color-${productId}`).value.trim();
            if (!color) {
                showNotification('Please enter a color preference for this item.');
                return;
            }
        }
        const existing = cart.find(item => item.id === productId && item.color === color);
        if (existing) {
            existing.quantity += quantity;
        } else {
            cart.push({
                ...product,
                quantity: quantity,
                color: color
            });
        }
        updateCartDisplay();
        showNotification(`${product.name} added to cart!`);
    };

    window.updateQuantity = function(productId, newQuantity) {
        if (newQuantity < 1) {
            removeFromCart(productId);
            return;
        }
        const item = cart.find(i => i.id === productId);
        if (item) {
            item.quantity = newQuantity;
            updateCartDisplay();
        }
    };

    window.removeFromCart = function(productId) {
        cart = cart.filter(i => i.id !== productId);
        updateCartDisplay();
    };

    function displayProducts() {
        productsGrid.innerHTML = products.map(product => {
            const colorField = product.needsColor ? `
                <input type="text" class="color-input" id="color-${product.id}" placeholder="Color / Finish (e.g., White, Walnut, Natural)" required>
            ` : '';
            return `
                <div class="product-card">
                    <span class="product-badge">${product.category}</span>
                    <img src="${product.image}" alt="${product.name}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-price">KSh ${product.price.toLocaleString()}</p>
                        <div class="product-actions">
                            <div class="quantity-row">
                                <input type="number" min="1" value="1" class="quantity-selector" id="qty-${product.id}">
                            </div>
                            ${colorField}
                            <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function loadCart() {
        const stored = localStorage.getItem('cart');
        if (stored) {
            try {
                cart = JSON.parse(stored);
            } catch(e) { console.error(e); }
        }
        updateCartDisplay();
    }

    document.getElementById('cartIcon').addEventListener('click', () => {
        document.querySelector('.cart-sidebar').scrollIntoView({ behavior: 'smooth' });
    });

    displayProducts();
    loadCart();

    const style = document.createElement('style');
    style.textContent = `@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`;
    document.head.appendChild(style);
</script>
</body>
</html>
